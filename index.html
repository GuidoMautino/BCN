const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function dec(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(P.salt),iterations:310000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(P.iv)},key,b64(P.ct));
  return new TextDecoder().decode(pt);
}
async function go(){
  const pw=document.getElementById('pw').value.trim().toLowerCase();
  try{
    const html=await dec(pw);
    try{localStorage.setItem('rumbo-pw',pw)}catch(e){}
    document.open();document.write(html);document.close();
  }catch(e){document.getElementById('err').style.display='block'}
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go()});
(async()=>{try{const s=localStorage.getItem('rumbo-pw');if(s){const h=await dec(s);document.open();document.write(h);document.close()}}catch(e){}})();
</script></body></html>
